name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export static site
        env:
          # Ajusta esto si tu repo NO se llama "mi-portfolio"
          FRONTEND_PATH: "/mi-portfolio"
        run: |
          reflex export --no-zip --frontend-only

      - name: Prepare Pages artifact
        run: |
          rm -rf public
          mkdir -p public
          if [ -f ".web/public/index.html" ]; then
            cp -r .web/public/. public/
          elif [ -f ".web/build/client/public/index.html" ]; then
            cp -r .web/build/client/public/. public/
          elif [ -f ".web/build/client/index.html" ]; then
            cp -r .web/build/client/. public/
          elif [ -f ".web/_static/index.html" ]; then
            cp -r .web/_static/. public/
          else
            echo "No se encontro index.html en rutas conocidas de Reflex."
            ls -la .web || true
            ls -la .web/build || true
            ls -la .web/build/client || true
            exit 1
          fi
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4