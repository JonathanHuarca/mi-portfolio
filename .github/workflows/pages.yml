name: Deploy to GitHub Pages (pages.yml)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export static site
        env:
          # Ajusta esto si tu repo NO se llama "mi-portfolio"
          FRONTEND_PATH: "/mi-portfolio"
        run: |
          reflex export --no-zip --frontend-only

      - name: Ensure output is valid for Pages
        run: |
          # GitHub Pages can ignore some paths when Jekyll is enabled.
          # .nojekyll disables Jekyll processing for the published artifact.
          touch .web/build/client/.nojekyll
          test -f .web/build/client/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .web/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4

