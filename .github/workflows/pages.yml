name: Deploy to GitHub Pages (pages.yml)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export static site
        env:
          # Ajusta esto si tu repo NO se llama "mi-portfolio"
          FRONTEND_PATH: "/mi-portfolio"
        run: |
          reflex export --no-zip --frontend-only

      - name: Prepare Pages artifact
        run: |
          rm -rf public
          mkdir -p public
          SOURCE_DIR=""
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          for CANDIDATE in \
            ".web/public" \
            ".web/build/client/public" \
            ".web/build/client/${REPO_NAME}" \
            ".web/build/client" \
            ".web/_static"
          do
            if [ -f "${CANDIDATE}/index.html" ]; then
              SOURCE_DIR="${CANDIDATE}"
              break
            fi
          done

          if [ -z "${SOURCE_DIR}" ]; then
            FOUND_INDEX="$(find .web -maxdepth 6 -type f -name index.html | head -n 1)"
            if [ -n "${FOUND_INDEX}" ]; then
              SOURCE_DIR="$(dirname "${FOUND_INDEX}")"
            fi
          fi

          if [ -z "${SOURCE_DIR}" ]; then
            echo "No se encontro index.html en rutas conocidas de Reflex."
            ls -la .web || true
            ls -la .web/build || true
            ls -la .web/build/client || true
            exit 1
          fi

          echo "Usando salida estatica desde: ${SOURCE_DIR}"
          cp -r "${SOURCE_DIR}"/. public/
          # .nojekyll evita que Pages filtre archivos/carpetas.
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4

